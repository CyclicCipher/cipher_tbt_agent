   "desc":"This 'dual head attention' technique claims to generalize outside of the training set in multiplication by using a sine head that attends to structural patterns somehow. Could it be legit? If this made some progress in structure discovery but isn't the peak, what would a more capable system do instead? Can it improve analogical and abductive reasoning?",
   "url":"https://github.com/yzb3001313-star/Dual-Head-Attention-Enables-Length-Generalization"},
  {"n":69,"t":"Triangle-based activation function (TBAF)","pri":"activ","sec":["latent"],"paper":"Triangle-Based Activation Function",
   "desc":"Correction to the earlier note: in the repo experiment the custom activation was used only ONCE in the entire model (an image model) and still achieved its goal — it is NOT required in every block. If a single placement suffices, where should that one placement go in a looped / depth-recurrent JEPA core? Candidates: the phase channel of relational attention (phase is periodic; a triangle wave respects periodicity), or the single shared recurrent block (applied every loop via weight-sharing). Does it beat SwiGLU there, and why?",

  {"n":70,"t":"NeuronGuard: spiking neural network (Rust/CPU)","pri":"arch","sec":[],"paper":"",

  {"n":78,"t":"RISE world model for VLA","pri":"world","sec":["rl","multi"],"paper":"",

   "url":"https://opendrivelab.com/RISE/"},
  {"n":79,"t":"Hippocampus / complementary learning systems","pri":"continual","sec":["memory"],"paper":"",
   "desc":"There's no complex animal without a hippocampus. No animal with a neocortex lacks a hippocampus. If the hippocampus were unnecessary for long-term continual learning, we wouldn't waste resources on it. It is probably impossible to solve continual learning without an equivalent of the hippocampus and complementary learning systems. Is there a better way to do long-term memory than this paper? Could the answer be to replace the traditional ML replay buffer entirely with a hippocampus that doesn't just interleave old and new experiences but acts like model-based simulation?",
   "url":"https://arxiv.org/pdf/2605.26099"},
  {"n":80,"t":"Metacognition in latent recurrent model","pri":"latent","sec":["safety"],"paper":"",
   "desc":"'Introspection heads' appears to be a hallucinated (not real) idea. If you were making a recurrent model that thinks in latent space, perhaps with a JEPA objective and the resulting representations, what does metacognition look like and what could it do? Could it learn to control or alter its latent states? The self/other boundary of items 43 and 94 is the function a self-model serves; metacognition is that self-model made reflexive — the 'I' that owns the latent trajectory and can introspect or control it.",

   "url":"https://github.com/UditAkhourii/adhd"},
  {"n":83,"t":"xAI C-based vertically integrated training stack","pri":"hardware","sec":[],"paper":"",
   "desc":"xAI built a vertically integrated training stack written entirely in C that trains over an order of magnitude faster than JAX, with heavy GPU parallelism across the pipeline. Would use Rust, not C — but should this be done at all? Likely for commercialization, perhaps not for testing.",

  {"n":85,"t":"DiffusionBlocks: block-wise training via diffusion interpretation","pri":"training","sec":["compress","arch"],"paper":"DiffusionBlocks: Block-wise Neural Network Training via Diffusion Interpretation",
   "desc":"Sakana AI. Reduces training memory by splitting the model into blocks trained independently, treating the forward pass like a diffusion model denoising a signal. Because we are memory-constrained (4GB VRAM), this is a worthwhile avenue — and it is a natural fit for recurrent-depth transformers, exactly the target architecture.",

  {"n":86,"t":"Chollet's symbolic descent / program synthesis in connectionist models","pri":"neuro","sec":["reasoning"],"paper":"",

   "url":""},
  {"n":88,"t":"NVIDIA PID: high-resolution latent decoding with pixel diffusion","pri":"multi","sec":["latent","reasoning"],"paper":"Fast and High-Resolution Latent Decoding with Pixel Diffusion",
   "desc":"For image generation, but could it be useful for reasoning models? Fast, high-resolution decoding of latents via pixel diffusion — possibly relevant to decoding latent thoughts, or as a diffusion-style decoding head (cf. item 85).",
   "url":"https://research.nvidia.com/labs/sil/projects/pid/"},
  {"n":89,"t":"Learning to skip blocks (ultrametric routing for sparse attention)","pri":"compress","sec":["hardware","arch"],"paper":"Learning to Skip Blocks: Self-Discovered Ultrametric Routing for Hardware-Accelerated Sparse Attention",
   "desc":"The developer found a way to make LLMs learn to skip unnecessary blocks — learning where NOT to think — by not loading the irrelevant blocks onto the GPU, making the model many times faster and slashing most of the memory requirement. The approach is complex and has points of failure. Directly relevant to the 4GB constraint and to AutoTTS-style learned compute allocation (deciding where not to spend depth).",
   "url":"https://github.com/sneed-and-feed/adelic-spectral-zeta/blob/main/papers/learning_to_skip_blocks.md"},
  {"n":90,"t":"Fuse DiffusionBlocks + JEPA into a prospective-configuration training algorithm?","pri":"training","sec":["continual","world"],"paper":"",
   "desc":"Could DiffusionBlocks (item 85) and JEPA world modeling be fused into a viable prospective-configuration training algorithm? Prospective configuration (item 92) is a backprop alternative that infers the target neural activity before modifying weights, and notably resists catastrophic forgetting — a key need if the model must learn a world model through experience.",
   "url":""},
  {"n":91,"t":"More efficient settling for prospective configuration","pri":"optim","sec":["continual","training"],"paper":"",
   "desc":"Prospective configuration requires a relaxation/settling step (inference to convergence) before each weight update, which is its main cost. Is there a more efficient way to perform this settling — possibly reusing the model's own recurrent-depth / equilibrium (DEQ) machinery, or another technique in this list?",
   "url":""},
  {"n":92,"t":"Prospective configuration (learning beyond backpropagation)","pri":"continual","sec":["optim","neuro"],"paper":"Inferring Neural Activity Before Plasticity as a Foundation for Learning Beyond Backpropagation",
   "desc":"Song, Millidge, Salvatori, Lukasiewicz, Xu, Bogacz (Nature Neuroscience, 2024). A backprop alternative grounded in energy-based / predictive-coding networks: the network first infers the neural activity that should result from learning (a relaxation/settling step), then modifies weights to consolidate it — the reverse of backprop's order. More efficient in deep structures, online learning, limited data, changing environments, and continual learning with multiple tasks, where it resists catastrophic forgetting. The settling step is an energy relaxation to convergence — the same fixed-point computation as depth recurrence / DEQ, so it could reuse that machinery (item 91).",
   "url":"https://www.nature.com/articles/s41593-023-01514-1"},
  {"n":93,"t":"Gemma 4 encoder-free multimodality","pri":"multi","sec":["arch"],"paper":"Gemma 4 12B (Google DeepMind)",
   "desc":"Google DeepMind's Gemma 4 12B (June 2026, Apache 2.0) is encoder-free: no separate vision/audio encoders. Raw image patches and audio waveforms are projected directly into the LLM embedding space via lightweight linear layers (a matrix multiply + positional embedding + norm for vision; raw projection for audio), and one decoder-only transformer handles all modalities; runs on 16GB. Can we copy it? Largely YES — it validates the thin-adapter-into-shared-core input design (architecture §6b) at production scale and substantially settles the encoder half of A9: you do not need separate encoders, thin linear projection suffices. It differs from us in being a standard autoregressive decoder, not JEPA / clamped-settling — so it answers the input/encoder side, not the decoder or clamped-settling questions.",
   "url":"https://blog.google/innovation-and-ai/technology/developers-tools/introducing-gemma-4-12b/"},
  {"n":94,"t":"Identity-aware pretraining (self vs other; not learning bad habits)","pri":"pretrain","sec":["safety","continual"],"paper":"",
   "desc":"How does a model, during pretraining, distinguish text written by others from text it produced itself, and avoid absorbing others' habits/behaviors as its own — e.g. mimicking emotions like frustration or anger that lower performance and can be unsafe, despite having no built-in emotions? And how to make memory identity-aware (mine vs observed)? Candidate directions: provenance/authorship as a conditioning channel (a 'speaker' axis separating self from corpus) so behavior is conditioned rather than absorbed; a distinct identity representation the model never imitates; separating an observed-behavior representation from an enacted-behavior policy; and at the memory layer, tagging stored content with provenance so retrieval is identity-aware. Open and important; ties to the clamped-I/O channels (§6b) and continual-learning memory (item 79). Likely the same capability as item 43 (intervention vs observation, at the SFT stage) and item 80 (metacognition): all three rest on a self-model separating self from world, with active inference (item 20) the natural home, since an agent already distinguishes its actions from observations. Absorbing others' frustration is a self/other-boundary failure — treating observed behavior as behavior to enact.",
   "url":""},
  {"n":95,"t":"q0: Hyper-Epoch Pretraining (lesson for single-model generalization)","pri":"training","sec":["optim","pretrain"],"paper":"q0: Primitives for Hyper-Epoch Pretraining",
   "desc":"Mandal et al. (Q Labs / Princeton, arXiv:2606.03938, June 2026). Beats single-model gradient-descent saturation under fixed data by training a POPULATION (cyclic explore-then-settle snapshots + chain distillation + a learned generalization prior), Solomonoff-motivated; ~4.6x fewer epochs, ~12.9x data efficiency. We will NOT train an ensemble. The lesson for a SINGLE model: GD saturates because it commits to one hypothesis, while generalization wants a posterior over hypotheses. Single-model analogues of the three primitives: (1) self-distillation against an EMA/snapshot of yourself — chain distillation's dark-knowledge enrichment without N models; (2) a cyclic explore-then-settle schedule + weight-space averaging (SWA / model soups) to land one model in a flat, wide optimum; (3) item 52's SNR preconditioner as the per-update generalization filter. Converges with item 52 and epiplexity (item 96) on one target: extract compressible structure, suppress memorization, measured from the training stream itself.",
   "url":"https://arxiv.org/pdf/2606.03938"},
  {"n":96,"t":"Epiplexity as a loss function for fast generalization","pri":"training","sec":["optim","repr","dataset"],"paper":"Epiplexity (CMU dissertation)",
   "desc":"Epiplexity (epistemic complexity) measures the structural information a COMPUTE-BOUNDED model can extract from data — operationally the area under the (online minus converged) loss curve: rapid loss drop = high structure absorbed, flat = noise. Its data-selection implication: the best pretraining data MAXIMIZES learnable structure, not minimizes final loss. Taken further into a LOSS: minimize cumulative ONLINE (prequential, predict-before-update) loss rather than final-batch loss — a model that compresses the stream best has generalized most, and online loss is a held-out-free generalization signal by construction (it predicts the next unseen point). To make it trainable, use a teacher/EMA as the 'offline' baseline (= self-distillation again, tying to q0). Most on-target tool for the project's primary goal: structure-per-token IS data efficiency. Caveat: it is a measure, not yet a proven local loss — turning the global integral into a stable per-step objective is the open work.",
   "url":"https://ml.cmu.edu/research/phd-dissertation-pdfs/yidingji_phd_mld_2025.pdf"},
  {"n":97,"t":"Bitter-lesson curriculum via epiplexity","pri":"dataset","sec":["training","pretrain"],"paper":"",
   "desc":"Hand-curating dataset content and presentation order for curriculum learning is brittle and does not scale — the anti-bitter-lesson. The bitter-lesson alternative: let a measured signal drive data selection and ordering. Epiplexity (item 96) is that signal: at each step prioritize the data slices yielding the most structure-gain (online minus offline), deprioritize zero-epiplexity slices (noise, or already-absorbed structure). Adaptive by construction — as structure is absorbed its epiplexity falls, so the curriculum auto-advances along the frontier of learnable structure (a principled learning-progress curriculum). This is active inference applied to data: seek the data that maximizes expected information gain. Replaces hand-engineering with an online optimization.",
   "url":""},
  {"n":98,"t":"Reservoir computing (HypercubeESN) for the time-series gap","pri":"arch","sec":["memory","world","hardware"],"paper":"HypercubeESN",
   "desc":"Critical gap: the architecture has thinking-time recurrence (depth, chain) but NO native streaming-temporal substrate, and attention — even the relational variant — is poorly suited to time-series forecasting, an inductive-bias mismatch a better attention will not fix. Worse, the DEQ/attractor core CONVERGES (kills dynamics to reach an answer), the OPPOSITE of what time-series needs: sustained non-converging dynamics that hold temporal history. Reservoir computing supplies the missing piece — a FIXED random recurrent reservoir with fading memory lifts a streaming signal into a high-dimensional temporal embedding; only a readout trains (cheap, data-efficient, BPTT-free). HypercubeESN realizes this memory-frugally: tanh neurons on a Boolean hypercube, XOR-addressed Hamming-1 connectivity (zero adjacency storage), a per-neuron delay line gathering across space AND time, the whole reservoir reproducible from a few scalars (DIM, seed, spectral radius, leak, history depth), edge-friendly (fits 4GB). This is a THIRD recurrence type (temporal/reservoir) distinct from depth and chain, integrated as a frozen temporal front-end feeding the reasoning core — i.e. time-series becomes 'just another clamped modality' (§6b) whose adapter is a reservoir. Calibration: 'transformers cannot do time-series so cannot be AGI' overstates it (TS transformers exist but are routinely beaten by simpler models); the sound conclusion — add a native temporal substrate — stands. HypercubeESN is a small early project; the reservoir-computing DIRECTION is the established, proven part.",
   "url":"https://github.com/dliptak001/HypercubeESN"}
]
</script>

<script>
const CATS = [
  {id:'arch',     label:'Architecture',        cg:'purple'},
  {id:'tts',      label:'Test-time scaling',   cg:'purple'},
  {id:'latent',   label:'Latent reasoning',    cg:'purple'},
  {id:'posenc',   label:'Positional encoding', cg:'purple'},
  {id:'memory',   label:'Memory / KG',         cg:'teal'},
  {id:'continual',label:'Continual learning',  cg:'teal'},
  {id:'world',    label:'World modeling',      cg:'teal'},
  {id:'multi',    label:'Multimodality',       cg:'teal'},
  {id:'training', label:'Training algorithms', cg:'amber'},
  {id:'pretrain', label:'Pretraining',         cg:'amber'},
  {id:'finetune', label:'Fine-tuning',         cg:'amber'},
  {id:'optim',    label:'Optimizer design',    cg:'amber'},
  {id:'dataset',  label:'Dataset',             cg:'amber'},
  {id:'activ',    label:'Activations / norm',  cg:'amber'},
  {id:'safety',   label:'Alignment / safety',  cg:'coral'},
  {id:'neuro',    label:'Neurosymbolic',       cg:'green'},
  {id:'rl',       label:'RL methods',          cg:'green'},
  {id:'reasoning',label:'Reasoning strategies',cg:'green'},
  {id:'attention',label:'Attention',           cg:'blue'},
  {id:'compress', label:'Compression',         cg:'blue'},
  {id:'kvcache',  label:'KV cache',            cg:'blue'},
  {id:'repr',     label:'Representation',      cg:'blue'},
  {id:'hardware', label:'Hardware / systems',  cg:'blue'},
];

const ITEMS = JSON.parse(document.getElementById('data').textContent);
const catMap = Object.fromEntries(CATS.map(c => [c.id, c]));
let activeFilters = new Set();
let searchQuery = '';

function getCat(id) { return catMap[id] || {id, label: id, cg: 'amber'}; }

function badge(id, isPri) {
  const c = getCat(id);
  return `<span class="badge cg-${c.cg}${isPri ? ' pri' : ''}">${c.label}</span>`;
}

function urlLabel(url) {
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');
    const path = u.pathname.length > 1 ? u.pathname.slice(1, 30) + (u.pathname.length > 30 ? '…' : '') : '';
    return path ? `${host}/${path}` : host;
  } catch { return url.slice(0, 40); }
}

function matches(item) {
  const q = searchQuery.toLowerCase();
  if (q) {
    const searchable = [item.t, item.desc, item.paper, String(item.n)].join(' ').toLowerCase();
    if (!searchable.includes(q)) return false;
  }
  if (activeFilters.size === 0) return true;
  return [item.pri, ...(item.sec || [])].some(c => activeFilters.has(c));
}

function render() {
  const matched = ITEMS.filter(matches);
  document.getElementById('count').textContent = `Showing ${matched.length} of ${ITEMS.length} items`;
  document.getElementById('items').innerHTML = matched.map(item => {
    const sec = (item.sec || []).map(s => badge(s, false)).join('');
    const paper = item.paper ? `<div class="item-paper">${item.paper}</div>` : '';
    const desc = item.desc ? `<div class="item-desc">${item.desc}</div>` : '';
    const link = item.url ? `<a class="item-link" href="${item.url}" target="_blank" rel="noopener">${urlLabel(item.url)} ↗</a>` : '';
    return `<div class="item">
      <div class="item-num">#${item.n}</div>
      <div class="item-body">
        <div class="item-title">${item.t}</div>
        ${paper}
        <div class="item-cats">${badge(item.pri, true)}${sec}</div>
        ${desc}
        ${link}
      </div>
    </div>`;
  }).join('');
}

function renderChips() {
  const allActive = activeFilters.size === 0 ? ' active' : '';
  let html = `<span class="chip all${allActive}" onclick="clearFilters()">all ${ITEMS.length}</span>`;
  CATS.forEach(c => {
    const cnt = ITEMS.filter(i => i.pri === c.id || (i.sec || []).includes(c.id)).length;
    const act = activeFilters.has(c.id) ? ' active' : '';
    html += `<span class="chip cg-${c.cg}${act}" onclick="toggleFilter('${c.id}')">${c.label} <span style="opacity:0.65">${cnt}</span></span>`;
  });
  document.getElementById('chips').innerHTML = html;
}

function toggleFilter(id) {
  activeFilters.has(id) ? activeFilters.delete(id) : activeFilters.add(id);
  renderChips(); render();
}
function clearFilters() { activeFilters.clear(); renderChips(); render(); }

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value; render();
});

renderChips();
render();
</script>
</body>
</html>
