# Guided visual cortex — all three Monty features.
#
# V1 (5×5 foveal) → IT (3×1 supervised, 3 voting columns)
#
# What's active here vs visual_v1it.yaml:
#   1. Hypothesis-directed fixation  — classify() picks remaining fixation
#      positions that best discriminate the current IT leader from runner-up.
#   2. Negative evidence (miss_penalty=0.1) — IT minicolumns whose stored
#      model predicts a feature at a location but the actual feature differs
#      receive a small negative evidence contribution.
#   3. Three IT columns (grid [3,1]) — top, middle, bottom of V1 each have
#      an independent IT column; they vote by summing evidence before pred.
#
# RF layout (auto-computed from grids):
#   IT [3,1] over V1 [5,5]:
#     rf_half_w = 5/1 = 5  → all V1 columns included horizontally
#     rf_half_h = 5/3 ≈ 1.67
#     IT (0,0): cy=0  → V1 rows {0, 1}      → 10 V1 columns (top strip)
#     IT (1,0): cy=2  → V1 rows {1, 2, 3}   → 15 V1 columns (middle band)
#     IT (2,0): cy=4  → V1 rows {3, 4}      → 10 V1 columns (bottom strip)
#   Each IT column sees a spatially distinct subset → truly independent votes.

name: guided_visual
eye_type: foveal

layers:

  # V1 — Primary visual cortex (foveal retina).
  - id: V1
    grid: [5, 5]
    n_mini: 10
    supervised: false
    chl: true             # Phase 1: Contrastive Hebbian Learning
    reference_frame:
      type: retinotopic
      params:
        retina_size: 19
        patch_size: 5
        stride: 3
        image_w: 28
        image_h: 28
        encoding: grid    # grid keys (2D); _loc_sim gives distance-decay similarity
    input:
      source: sensor
      encoder: hog
      encoder_params:
        patch_size: 5
        n_bins: 8
        top_k: 3

  # IT — Three independent voting columns.
  # miss_penalty: penalty applied when stored model predicts something
  # different from the observed V1 winner (negative evidence).
  # lateral_bonus: Phase 5 — evidence bonus from adjacent IT columns.
  - id: IT
    grid: [3, 1]
    n_mini: 10
    supervised: true
    miss_penalty: 0.1
    lateral_bonus: 0.1    # Phase 5: lateral inhibition between IT columns
    reference_frame:
      type: allocentric
      params: {}
    input:
      source: V1
