# Guided visual cortex — V1 → IT with feedback and global lateral voting.
#
# V1 (5×5 foveal) → IT (3×1 unsupervised, 3 voting columns)
#
# Active features:
#   1. Hypothesis-directed fixation  — classify() picks remaining fixation
#      positions that best discriminate the current IT leader from runner-up.
#   2. Negative evidence (miss_penalty=0.1) — IT minicolumns whose stored
#      model predicts a different feature at a location receive a small
#      negative evidence contribution.
#   3. Three IT columns (grid [3,1]) — top, middle, bottom of V1 each have
#      an independent IT column; they vote via OutputCortex.
#   4. Global lateral voting (_global_lateral_pass) — full-layer plurality
#      winner gets a small evidence bonus in every column of that layer.
#   5. IT→V1 feedback (_feedback_pass) — after each fixation, IT's winner
#      minicolumn's predictions prime the corresponding V1 columns.
#   6. OutputCortex readout — IT is fully unsupervised; label association
#      lives in OutputCortex (Hebbian minicolumn→label mapping).
#
# RF layout (auto-computed from grids):
#   IT [3,1] over V1 [5,5]:
#     rf_half_w = 5/1 = 5  → all V1 columns included horizontally
#     rf_half_h = 5/3 ≈ 1.67
#     IT (0,0): cy=0  → V1 rows {0, 1}      → 10 V1 columns (top strip)
#     IT (1,0): cy=2  → V1 rows {1, 2, 3}   → 15 V1 columns (middle band)
#     IT (2,0): cy=4  → V1 rows {3, 4}      → 10 V1 columns (bottom strip)
#   Each IT column sees a spatially distinct subset → truly independent votes.

name: guided_visual
eye_type: foveal

layers:

  # V1 — Primary visual cortex (foveal retina).
  - id: V1
    grid: [5, 5]
    n_mini: 10
    supervised: false
    chl: true             # Phase 1: Contrastive Hebbian Learning
    reference_frame:
      type: retinotopic
      params:
        retina_size: 19
        patch_size: 5
        stride: 3
        image_w: 28
        image_h: 28
        encoding: grid    # grid keys (2D); _loc_sim gives distance-decay similarity
    input:
      source: sensor
      encoder: hog
      encoder_params:
        patch_size: 5
        n_bins: 8
        top_k: 3

  # IT — Three independent voting columns, fully unsupervised.
  # Label association lives in OutputCortex, not inside the minicolumns.
  # n_mini=20: more prototypes than classes; lets IT discover multiple
  # structural variants per digit without being told which is which.
  # miss_penalty: penalty when stored model predicts differently from
  # the observed V1 winner (negative evidence — rewards specificity).
  # lateral_bonus: evidence bonus from adjacent IT columns.
  - id: IT
    grid: [3, 1]
    n_mini: 20
    supervised: false
    miss_penalty: 0.1
    lateral_bonus: 0.1
    reference_frame:
      type: allocentric
      params: {}
    input:
      source: V1
