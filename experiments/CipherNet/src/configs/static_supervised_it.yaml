# Static-eye supervised IT — 2048-bit Gabor SDR.
#
# Same as foveal_supervised_it.yaml but with StaticEye (single fixation
# at object centroid, full 28×28 image visible).
# Use for ablation: removes saccade complexity, isolates SDR quality.

name: static_supervised_it
eye_type: static

layers:

  - id: V1
    grid: [6, 6]
    n_mini: 1
    supervised: false
    chl: false
    reference_frame:
      type: retinotopic
      params:
        retina_size: 29
        patch_size: 5
        stride: 4
        image_w: 28
        image_h: 28
        encoding: grid
    input:
      source: sensor
      encoder: gabor
      encoder_params:
        patch_size: 5
        n_orientations: 16
        n_frequencies: 8
        n_phases: 2
        n_positions: 8
        top_k: 40

  - id: IT
    grid: [3, 1]
    n_mini: 10
    supervised: true
    chl: false
    lateral_bonus: 0.1
    reference_frame:
      type: allocentric
      params: {}
    input:
      source: V1
