# Foveal supervised IT — 2048-bit Gabor SDR, object-relative locations.
#
# Architecture:
#   - FovealExplorer: centroid + 8 cardinal/diagonal offsets, step=5.
#     Use --n_fixations 7 (centroid + 6 cardinal offsets).
#   - V1: 5×5 Gabor grid (19×19 retina, patch_size=5, stride=3).
#     Each patch → 2048-bit SDR with 40 active bits (1.95% sparsity).
#     None for blank patches (structural, inside encoder).
#     Location keys: centroid-relative integer bins (RetinotopicFrame).
#   - IT: 3×1 columns, 10 minicolumns (one per digit class).
#     Supervised: mini_idx forced = digit label every training image.
#     Union model: model[loc] = bitwise OR of all training SDRs at loc.
#     With 1.95% sparsity, union stays informative for 100+ examples.
#
# SDR parameters match Monty (Numenta):
#   n_filters = 16 ori × 8 freq × 2 phase × 8 pos = 2048
#   top_k = 40  →  40/2048 = 1.95% sparsity

name: foveal_supervised_it
eye_type: foveal

layers:

  - id: V1
    grid: [5, 5]
    n_mini: 1
    supervised: false
    chl: false
    reference_frame:
      type: retinotopic
      params:
        retina_size: 19
        patch_size: 5
        stride: 3
        image_w: 28
        image_h: 28
        encoding: grid
    input:
      source: sensor
      encoder: gabor
      encoder_params:
        patch_size: 5
        n_orientations: 16
        n_frequencies: 8
        n_phases: 2
        n_positions: 8
        top_k: 40

  - id: IT
    grid: [3, 1]
    n_mini: 10
    supervised: true
    chl: false
    lateral_bonus: 0.1
    reference_frame:
      type: allocentric
      params: {}
    input:
      source: V1
