# Visual cortex — V1 → V2 → IT hierarchy.
#
# What the genome defines:
#   - Layer order and anatomical connectivity (input source)
#   - Reference frame type per layer (innate topographic maps)
#   - Sensory encoder for the sensor layer (thalamic relay type)
#   - Supervised flag: IT uses label as winner (hippocampal feedback)
#
# What the genome does NOT define:
#   - What features exist (learned from data at each layer)
#   - What objects/classes exist (IT learns from data)
#   - Receptive fields (auto-computed from grid sizes)

name: visual
eye_type: foveal

layers:

  # V1 — Primary visual cortex.
  # Input: HOG-encoded retinal patches (via thalamus).
  # Reference frame: retinotopic (each column's innate retinal position).
  # Unsupervised: minicolumns develop feature-type selectivity
  # (edge orientations, textures) via WTA evidence accumulation.
  - id: V1
    grid: [5, 5]
    n_mini: 10
    supervised: false
    reference_frame:
      type: retinotopic
      params:
        retina_size: 19
        patch_size: 5
        stride: 3
        image_w: 28
        image_h: 28
    input:
      source: sensor
      encoder: hog
      encoder_params:
        patch_size: 5
        n_bins: 8
        top_k: 3

  # V2 — Secondary visual cortex.
  # Input: V1 population (tentative winner indices from V1 columns).
  # Each V2 column covers a 3×3 neighbourhood of V1 columns (auto-computed
  # from grid sizes: V2 2×2 over V1 5×5 → rf_half = 2.5 → 9 V1 cols each).
  # Reference frame: retinotopic at coarser scale (larger stride, patch).
  # Unsupervised: minicolumns develop selectivity for spatial combinations
  # of V1 feature types (curves, junctions, oriented bands).
  - id: V2
    grid: [2, 2]
    n_mini: 10
    supervised: false
    reference_frame:
      type: retinotopic
      params:
        retina_size: 19
        patch_size: 9
        stride: 7
        image_w: 28
        image_h: 28
    input:
      source: V1

  # IT — Inferotemporal cortex (object recognition).
  # Input: V2 population (all 4 V2 tentative winner indices).
  # Single macrocolumn: position-invariant (allocentric frame at origin).
  # SUPERVISED: minicolumn index == digit class label.
  # During training, commit_supervised(label) writes V2 patterns directly
  # to the correct class minicolumn (hippocampal replay / label feedback).
  # During inference, the minicolumn with highest accumulated evidence wins.
  - id: IT
    grid: [1, 1]
    n_mini: 10
    supervised: true
    reference_frame:
      type: allocentric
      params: {}
    input:
      source: V2
