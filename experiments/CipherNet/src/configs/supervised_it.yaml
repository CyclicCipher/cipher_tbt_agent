# Supervised IT — V1 (CHL) → IT (fully supervised, mini_idx == digit class).
#
# Identical to guided.yaml except IT uses supervised commits:
#   commit_supervised(label) forces mini `label` to win every training image.
#   n_mini = 10 (one slot per class, label 0..9).
#
# This is the "hippocampal signal" baseline: the training label directly
# drives which IT minicolumn specialises to which digit class.  No
# self-organisation required; class boundaries are imposed, not discovered.
#
# Use this to establish an upper-bound baseline before testing unsupervised
# or CHL variants.  All other features (global lateral, feedback, 3-column
# voting, OutputCortex) remain active for apples-to-apples comparison.
#
# Active features (same as guided.yaml):
#   1. Hypothesis-directed fixation
#   2. Negative evidence (miss_penalty=0.1)
#   3. Three IT columns (grid [3,1]) — voting via OutputCortex
#   4. Global lateral voting
#   5. IT→V1 feedback
#   6. OutputCortex readout (trivially correct with supervised IT: mini==label)

name: supervised_it
eye_type: foveal

layers:

  - id: V1
    grid: [5, 5]
    n_mini: 1         # V1 is a pure HOG pass-through; WTA is bypassed by direct-HOG mode.
    supervised: false # IT receives HOG codes directly (see cortex._build_rf_observations).
    chl: false        # No label supervision at V1 — V1 is sensory preprocessing only.
    reference_frame:
      type: retinotopic
      params:
        retina_size: 19
        patch_size: 5
        stride: 3
        image_w: 28
        image_h: 28
        encoding: grid
    input:
      source: sensor
      encoder: hog
      encoder_params:
        patch_size: 5
        n_bins: 8
        top_k: 3

  - id: IT
    grid: [3, 1]
    n_mini: 10
    supervised: true
    chl: false
    miss_penalty: 0.1
    lateral_bonus: 0.1
    reference_frame:
      type: allocentric
      params: {}
    input:
      source: V1
